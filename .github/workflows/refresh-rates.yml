name: Refresh Mortgage Rates

# Runs every Thursday at 6pm ET (FRED publishes PMMS data Thursdays)
# Also runs every Monday as a backup in case Thursday data is delayed
# Can also be triggered manually from GitHub Actions tab
on:
  schedule:
    - cron: "0 23 * * 4"  # Thursday 6pm ET (23:00 UTC)
    - cron: "0 14 * * 1"  # Monday 10am ET (14:00 UTC)
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and parse FRED mortgage rate data
        run: |
          python3 << 'EOF'
          import urllib.request, csv, json, sys
          from datetime import date, timedelta
          from io import StringIO

          # Date range: last 2 years
          today = date.today()
          two_years_ago = today - timedelta(days=730)

          url = (
            f"https://fred.stlouisfed.org/graph/fredgraph.csv"
            f"?id=MORTGAGE30US"
            f"&cosd={two_years_ago.isoformat()}"
            f"&coed={today.isoformat()}"
          )

          print(f"Fetching: {url}")

          req = urllib.request.Request(url, headers={
            "User-Agent": "Mozilla/5.0 (compatible; RioGroupAdvisor/1.0)"
          })

          with urllib.request.urlopen(req, timeout=30) as response:
            raw = response.read().decode("utf-8")

          print(f"Received {len(raw)} bytes")
          print("First 200 chars:", raw[:200])

          data = []
          reader = csv.DictReader(StringIO(raw))
          for row in reader:
            date_val = row.get("DATE", "").strip()
            rate_val = row.get("MORTGAGE30US", "").strip()
            # Skip rows with missing data (FRED uses "." for missing values)
            if date_val and rate_val and rate_val != ".":
              try:
                data.append({"date": date_val, "rate": float(rate_val)})
              except ValueError:
                pass

          if len(data) == 0:
            print("ERROR: No valid data rows parsed — aborting")
            sys.exit(1)

          # Sort ascending by date
          data.sort(key=lambda x: x["date"])

          print(f"Parsed {len(data)} data points")
          print(f"Oldest: {data[0]}")
          print(f"Latest: {data[-1]}")

          with open("public/rate-history.json", "w") as f:
            json.dump(data, f, indent=2)

          print("Successfully wrote public/rate-history.json")
          EOF

      - name: Commit updated rates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --quiet public/rate-history.json && echo "No changes — rates already current" || (
            git add public/rate-history.json
            git commit -m "chore: auto-refresh mortgage rate data $(date +%Y-%m-%d)"
            git push
            echo "Pushed updated rates — Vercel will auto-deploy"
          )

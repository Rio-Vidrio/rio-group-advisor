name: Refresh Mortgage Rates

# Runs every Thursday at 6pm ET (FRED publishes PMMS data Thursdays)
# Also runs every Monday as a backup in case Thursday data is delayed
# Can also be triggered manually from GitHub Actions tab
on:
  schedule:
    - cron: "0 23 * * 4"  # Thursday 6pm ET (23:00 UTC)
    - cron: "0 14 * * 1"  # Monday 10am ET (14:00 UTC)
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch FRED mortgage rate data
        run: |
          # Fetch last 2 years of 30-year fixed mortgage rate data from FRED
          # MORTGAGE30US = Freddie Mac Primary Mortgage Market Survey
          TWO_YEARS_AGO=$(date -d "2 years ago" +%Y-%m-%d 2>/dev/null || date -v-2y +%Y-%m-%d)
          TODAY=$(date +%Y-%m-%d)

          echo "Fetching FRED data from $TWO_YEARS_AGO to $TODAY..."

          curl -s --max-time 30 \
            "https://fred.stlouisfed.org/graph/fredgraph.csv?id=MORTGAGE30US&cosd=${TWO_YEARS_AGO}&coed=${TODAY}" \
            -o /tmp/fred_raw.csv

          # Verify we got valid data
          if [ ! -s /tmp/fred_raw.csv ]; then
            echo "ERROR: Empty response from FRED"
            exit 1
          fi

          head -5 /tmp/fred_raw.csv
          echo "Lines fetched: $(wc -l < /tmp/fred_raw.csv)"

      - name: Parse CSV and write JSON
        run: |
          python3 << 'EOF'
          import csv, json, sys

          data = []
          with open('/tmp/fred_raw.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  date = row.get('DATE', '').strip()
                  value = row.get('MORTGAGE30US', '').strip()
                  # Skip rows with missing data (FRED uses "." for missing)
                  if date and value and value != '.':
                      try:
                          data.append({"date": date, "rate": float(value)})
                      except ValueError:
                          pass

          if len(data) == 0:
              print("ERROR: No valid data rows parsed")
              sys.exit(1)

          # Sort by date ascending
          data.sort(key=lambda x: x['date'])

          print(f"Parsed {len(data)} data points")
          print(f"Latest: {data[-1]}")
          print(f"Oldest: {data[0]}")

          with open('public/rate-history.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("Written to public/rate-history.json")
          EOF

      - name: Commit updated rates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --quiet public/rate-history.json && echo "No changes to commit" || (
            git add public/rate-history.json
            git commit -m "chore: auto-refresh mortgage rate data $(date +%Y-%m-%d)"
            git push
            echo "Pushed updated rates — Vercel will auto-deploy"
          )
